name: 統計データ スクレイピング・自動送信

on:
  workflow_dispatch:
    inputs:
      event_id:
        description: 'vsmobile-kgy のイベント ID'
        required: true
        type: string

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Python セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 依存パッケージをインストール
        run: pip install -r requirements.txt

      - name: Cookie をシークレットから書き込む
        run: |
          mkdir -p cookies
          echo '${{ secrets.COOKIES_ALL }}' > cookies/all.json

      - name: スクレイパーを実行
        id: scrape
        run: python scrape.py --cookies-all --output output/result.json

      - name: 統計データを API に送信
        id: upload
        run: |
          RESPONSE=$(curl -sf -w "\n%{http_code}" \
            -X POST \
            -H "Authorization: Bearer ${{ secrets.VSMOBILE_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d @output/result.json \
            "${{ secrets.VSMOBILE_API_URL }}/api/events/${{ inputs.event_id }}/stats" 2>&1 || true)

          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | head -n -1)

          echo "HTTP Status: $HTTP_CODE"
          echo "Response body: $BODY"

          if [ "$HTTP_CODE" != "200" ]; then
            echo "::error::API returned HTTP $HTTP_CODE: $BODY"
            exit 1
          fi

      - name: Cookie を削除
        if: always()
        run: rm -f cookies/all.json

      - name: 失敗を vsmobile-kgy API に通知
        if: failure()
        run: |
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          if [ "${{ steps.scrape.outcome }}" = "failure" ]; then
            ERROR_MSG="スクレイパーの実行に失敗しました（全ユーザーの Cookie が期限切れの可能性があります）。ログ: $RUN_URL"
          elif [ "${{ steps.upload.outcome }}" = "failure" ]; then
            ERROR_MSG="API への送信に失敗しました。ログ: $RUN_URL"
          else
            ERROR_MSG="ワークフローが失敗しました。ログ: $RUN_URL"
          fi

          PAYLOAD=$(python3 -c "import json, sys; print(json.dumps({'error': sys.argv[1]}))" "$ERROR_MSG")

          curl -sf \
            -X POST \
            -H "Authorization: Bearer ${{ secrets.VSMOBILE_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            "${{ secrets.VSMOBILE_API_URL }}/api/events/${{ inputs.event_id }}/notify_failure" || true
